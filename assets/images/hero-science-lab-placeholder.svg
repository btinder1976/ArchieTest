<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Science lab placeholder image</title>
  <desc id="desc">A dark science themed placeholder with DNA, molecules, AI grid, and welding sparks.</desc>
  <defs>
    <radialGradient id="bg" cx="35%" cy="30%" r="75%">
      <stop offset="0" stop-color="#1b8ea3"/>
      <stop offset="0.45" stop-color="#0d1b2a"/>
      <stop offset="1" stop-color="#03070d"/>
    </radialGradient>
    <linearGradient id="dna" x1="0" x2="1">
      <stop offset="0" stop-color="#3df2ff"/>
      <stop offset="1" stop-color="#8dff78"/>
