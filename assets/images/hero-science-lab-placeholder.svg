    <ellipse cx="160" cy="160" rx="180" ry="58" fill="none" stroke="#ffd166" stroke-width="4" opacity=".75" transform="rotate(-32 160 160)"/>
    <circle cx="160" cy="160" r="46" fill="#ff5c8a" opacity=".86"/>
  </g>
